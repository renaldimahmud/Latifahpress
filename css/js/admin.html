<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User - Perpustakaan STIE LM</title>
    
    <!-- ===== FONTS & LIBRARIES ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ===== CSS UTAMA ===== -->
    <link rel="stylesheet" href="css/styles-admin.css">
    
    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>

    <!-- ============================================================
    HEADER
    ============================================================ -->
    <div class="header-gradient">
        <h1>⚙️ Kelola User</h1>
        <div>
            <button class="nav-btn" onclick="window.location.href='index.html'">← Kembali</button>
        </div>
    </div>

    <!-- ============================================================
    MAIN CONTENT
    ============================================================ -->
    <div class="container">
        
        <!-- FORM TAMBAH/EDIT USER -->
        <div class="card">
            <h2 id="formTitle">➕ Tambah User Baru</h2>
            <input type="hidden" id="editRow" value="">
            
            <div class="form-row">
                <input type="text" id="fUsername" placeholder="Username" autocomplete="off">
                <input type="text" id="fPassword" placeholder="Password" autocomplete="off">
                <input type="text" id="fNama" placeholder="Nama Lengkap" autocomplete="off">
            </div>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-primary" id="btnSubmit" onclick="submitForm()">Tambah User</button>
                <button class="btn btn-cancel" id="btnCancel" onclick="cancelEdit()" style="display:none;">Batal</button>
            </div>
        </div>

        <!-- DAFTAR USER -->
        <div class="card">
            <h2>📋 Daftar User</h2>
            <div id="tableWrap">
                <div class="loading-msg">Memuat data user...</div>
            </div>
        </div>
    </div>

    <!-- ============================================================
    TOAST NOTIFICATION
    ============================================================ -->
    <div id="toast" class="toast"></div>

    <!-- ============================================================
    JAVASCRIPT (LOAD DI AKHIR)
    ============================================================ -->
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
