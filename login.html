<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perpustakaan STIE Latifah Mubarokiyah</title>
    
    <!-- ===== FONTS & LIBRARIES ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ===== CSS UTAMA ===== -->
    <link rel="stylesheet" href="css/styles-login.css">
    
    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>

    <!-- ============================================================
    TOMBOL BANTUAN ESTETIK (FLOATING)
    ============================================================ -->
    <button class="help-float-btn" id="helpFloatBtn" title="Hubungi Koordinator">
        <span class="wa-icon">
            <svg viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.247-.694.247-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
            </svg>
        </span>
        <span class="btn-text">Bantuan</span>
    </button>

    <!-- ============================================================
    POPUP BANTUAN WHATSAPP
    ============================================================ -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-modal">
            <div class="popup-header">
                <button class="popup-close" onclick="closePopup()">&times;</button>
                <div class="profile-photo" id="profilePhoto">
                    <img src="https://drive.google.com/thumbnail?id=1mFVM3H4AY8OZfHCSqzzAqPAbgRqSCDqM&sz=w400" 
                         alt="Koordinator" 
                         id="profileImg"
                         onload="this.classList.add('loaded')"
                         onerror="handleProfileError()">
                    <span class="photo-placeholder" id="photoPlaceholder">👤</span>
                </div>
                <h3 style="margin-bottom: 4px;">Drs. Ujang Mulyanto, M.M.</h3>
                <p style="font-size: 12px; opacity: 0.8;">Koordinator UPT Perpustakaan</p>
            </div>
            <div class="popup-body">
                <div class="info-item">
                    <div class="info-icon">💬</div>
                    <div class="info-text">
                        <div class="label">WhatsApp</div>
                        <div class="value"><a href="https://wa.me/6282115245732" target="_blank">0821 1524 5732</a></div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📧</div>
                    <div class="info-text">
                        <div class="label">Email</div>
                        <div class="value"><a href="mailto:ujangmulyanto99@gmail.com">ujangmulyanto99@gmail.com</a></div>
                    </div>
                </div>
                <button class="btn-wa" id="waPopupBtn">💬 Hubungi via WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    LOGIN BOX (GLASSMORPHISM)
    ============================================================ -->
    <div class="login-box">
        <div class="logo-container">
            <img src="https://drive.google.com/thumbnail?id=102L9NqOdjFgETx_400xkoNDSFWq2ewjm&sz=w500" 
                 alt="Logo STIE LM" 
                 class="logo-img" 
                 id="logoImg"
                 onload="this.classList.add('loaded')"
                 onerror="handleLogoError()">
            <div class="logo-placeholder" id="logoPlaceholder" style="display:none;">📚</div>
        </div>
        
        <h1>Selamat Datang</h1>
        <p class="subtitle">Sistem Informasi Perpustakaan STIE LM</p>
        
        <div class="clock-container">
            <div class="digital-clock" id="digitalClock">00:00<span class="clock-seconds">00</span></div>
            <div class="clock-date" id="clockDate">Loading...</div>
        </div>
        
        <div id="errorMsg" class="error-msg">⚠️ <span id="errorText">Login gagal!</span></div>
        
        <!-- FORM LOGIN -->
        <form id="loginForm" action="javascript:void(0)">
            <div class="form-group">
                <span class="input-icon">👤</span>
                <input type="text" class="form-input" id="username" placeholder="Username" required autofocus>
            </div>
            
            <div class="form-group">
                <span class="input-icon">🔒</span>
                <input type="password" class="form-input" id="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">Masuk</button>
        </form>
        
        <div class="footer">
            © 2026 <span>UPT Perpustakaan STIE Latifah Mubarokiyah</span>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT (LOAD DI AKHIR)
    ============================================================ -->
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>

    <!-- INISIALISASI TAMBAHAN -->
    <script>
        // Inisialisasi tambahan setelah semua file JS load
        document.addEventListener('DOMContentLoaded', function() {
            // Fokus ke username
            document.getElementById('username').focus();
        });
    </script>

</body>
</html>
