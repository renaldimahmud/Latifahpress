<script>
var SCRIPT_URL = "<?= scriptUrl ?>";

// =========================================================
// HANDLER ERROR GAMBAR
// =========================================================
function handleLogoError() {
    var img = document.getElementById('logoImg');
    var placeholder = document.getElementById('logoPlaceholder');
    img.style.display = 'none';
    placeholder.style.display = 'block';
}

function handleProfileError() {
    var img = document.getElementById('profileImg');
    var placeholder = document.getElementById('photoPlaceholder');
    img.style.display = 'none';
    placeholder.style.display = 'block';
}

// =========================================================
// JAM DIGITAL
// =========================================================
function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    
    document.getElementById('digitalClock').innerHTML = h + ':' + m + '<span class="clock-seconds">' + s + '</span>';
    
    var days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    var months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    
    document.getElementById('clockDate').textContent = days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// =========================================================
// POPUP BANTUAN
// =========================================================
var popupOverlay = document.getElementById('popupOverlay');
document.getElementById('helpFloatBtn').addEventListener('click', () => {
    popupOverlay.classList.add('active');
});
function closePopup() { popupOverlay.classList.remove('active'); }
popupOverlay.addEventListener('click', (e) => { if(e.target === popupOverlay) closePopup(); });

document.getElementById('waPopupBtn').addEventListener('click', function() {
    var username = document.getElementById('username').value.trim();
    var msg = 'Assalamualaikum Pak Ujang, saya mengalami kesulitan login perpustakaan.';
    if (username) msg += ' Username saya: ' + username + '.'; 
    else msg += ' Saya lupa username saya.';
    msg += ' Mohon bantuannya. Terima kasih.';
    window.open('https://wa.me/6282115245732?text=' + encodeURIComponent(msg), '_blank');
    closePopup();
});

// =========================================================
// LOGIN FORM (PERBAIKAN BUG)
// =========================================================
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Cegah reload halaman default
    
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();
    var btn = document.getElementById('btnLogin');
    var errorDiv = document.getElementById('errorMsg');
    var errorText = document.getElementById('errorText');
    
    if (!username || !password) {
        errorText.textContent = 'Username dan password harus diisi!';
        errorDiv.classList.add('show');
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Memproses...';
    errorDiv.classList.remove('show');
    
    google.script.run
        .withSuccessHandler(function(result) {
            btn.disabled = false;
            btn.innerHTML = 'Masuk';
            
            if (result.success && result.token) {
                localStorage.setItem('sessionToken', result.token);
                // PERBAIKAN BUG: replace() agar tombol back browser tidak kembali ke login
                window.top.location.replace(SCRIPT_URL + '?token=' + encodeURIComponent(result.token));
            } else {
                // PERBAIKAN BUG: else ditambahkan agar tidak terus redirect
                errorText.textContent = result.message || 'Username atau password salah!';
                errorDiv.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        })
        .withFailureHandler(function(err) {
            btn.disabled = false;
            btn.innerHTML = 'Masuk';
            errorText.textContent = 'Error sistem: ' + err.message;
            errorDiv.classList.add('show');
        })
        .verifyLogin(username, password);
});

// Auto focus
window.onload = function() { document.getElementById('username').focus(); };
</script>
