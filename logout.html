<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Perpustakaan STIE LM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .logout-container {
            max-width: 400px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .logout-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .logout-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .logout-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 16px;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
            animation: progress 2s ease forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <span class="logout-icon">🚪</span>
        <h1 class="logout-title">Sedang Keluar...</h1>
        <p class="logout-subtitle">Anda akan segera dialihkan ke halaman login</p>
        <div class="spinner"></div>
        <div class="progress-bar">
            <div class="fill"></div>
        </div>
        <p style="margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3);">
            Terima kasih telah menggunakan perpustakaan
        </p>
    </div>

    <script>
        // Tunggu 2 detik, lalu redirect ke login
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 2000);
    </script>
</body>
</html>
